volumes:
  postgres_data:

services:
  postgis:
    image: "mdillon/postgis"
    hostname: postgis
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: postgresql_data_volume
        target: /var/lib/postgresql/data
  geoserver:
    image: "kartoza/geoserver:2.22.0"
    ports:
      - "8080:8080"
    volumes:
      - /workspaces/${RepositoryName}/osm-styles:/opt/geoserver/data_dir
    environment:
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
      - STABLE_EXTENSIONS=css-plugin,feature-pregeneralized-plugin
      - HTTP_PROXY_NAME=${CODESPACE_NAME}-8080.preview.app.github.dev
      - HTTP_PROXY_PORT=443
      - HTTP_SCHEME=https
      - MAXIMUM_MEMORY=756M
      - INITIAL_MEMORY=128M

networks:
  default:
    name: gist604b

volumes:
  postgresql_data_volume:
